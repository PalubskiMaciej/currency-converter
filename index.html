<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator walut</title>
    <script defer src="js/script.js"></script>
    <link href="css/body.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">


</head>

<body class="body">
    <form class="js-form form">
        <fieldset class="form__fieldset">
            <legend class="form__legend">Kalkulator walut</legend>
            <p>
                <label class="form__label">
                    <span class="form__labelText ">Wybierz walutę do przeliczenia:</span>
                    <select class="js-currency form__labelInput form__labelInput--grow" name="currency">
                        <option value="GBP">GBP</option>
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                    </select>
                </label>
            </p>
            <p>
                <label class="form__label"> <span class="form__labelText form__labelText--grow">Kwota do przeliczenia w PLN:</span>
                    <input class="js-amount form__labelInput form__labelInput--grow" step="any" type="number" required name="amount" placeholder="Wpisz kwotę">
                </label>
            </p>

            <div class="form__buttonContainer"><button class="js-button form__button">Przelicz</button></div>
        </fieldset>
        <p class="form__paragraph">
            <span class="js-result">N/a</span>
        </p>

    </form>
</body>

</html>
